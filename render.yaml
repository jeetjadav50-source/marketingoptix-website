databases:
  - name: marketingoptix-db
    databaseName: marketingoptix
    user: marketingoptix

services:
  - type: web
    name: marketingoptix
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn marketingoptix.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketingoptix-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "marketingoptix.onrender.com"
